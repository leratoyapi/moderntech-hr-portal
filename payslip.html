<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Employee Payroll</h1>

<div id="employeeList"></div>

<div id="payslip" class="hidden">
    <h2>Payslip</h2>

    <p><strong>Employee ID:</strong> <span id="employeeid"></span></p>
    <p><strong>Hours Worked:</strong> <span id="hoursWorked"></span></p>
    <p><strong>Leave Deductions:</strong> R<span id="leaveDeductions"></span></p>
    <p><strong>Final Salary:</strong> R<span id="finalSalary"></span></p>

    <hr>

    <button onclick="downloadPayslip()">Download Payslip</button>
</div>

<script src="payroll.js"></script>

</body>
</html>
