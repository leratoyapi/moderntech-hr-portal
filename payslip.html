<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModernTech | Generate Payslip</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="payroll_style.css">
  

</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">
        <img src="hr.png" alt="Logo" height="30" class="me-2">ModernTech HR
      </a>
    </div>
  </nav>
  

   <!-- the main content  with a dropdown menu-->
  <div class="container mt-4">
    <h1 class="text-center">Generate Payslip</h1>

    <div class="card pr-select-card mb-4">
      <div class="card-body">
        <h5 class="card-title">Select Employee</h5>
          <div class="row">
            <div class="col-md-8">
              <label for="pr-employee-select" class="form-label">Choose Employee:</label>
              <select id="pr-employee-select" class="form-select">
                <option value="">-- Select an employee --</option>
              </select>
            </div>
                    
            <div class="col-md-4 d-flex align-items-end">
              <button id="pr-generate-btn" class="btn btn-primary w-100">Generate Payslip</button>
            </div>
          </div>
        </div>
      </div>

      
        </div>
    </div>



  <div class="payslip-container">
    <h1>Payslip for <span id="name"></span></h1>
    <p>Employee ID: <span id="id"></span></p>
    <p>OT Hours: <span id="hoursWorked"></span></p>
    <p>Deductions: <span id="leaveDeductions"></span></p>
    <p>Final Salary: R<span id="salary"></span></p>
  </div>

  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script href="payroll.js"></script>
</html>
