<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>


    <div class="login-container">
        <div class="left-side">
            <div class="left-content">
                <h1>ModernTech</h1>
                <p>Empowering businesses with smart HR solutions,talent management, payroll services and employee development.</p>
            </div>
        </div>
        <div class="right-side">
            <div class="login-card">
                <div class="logo-section">
                    <div class="brand-icon me-2 d-flex align-items-center justify-content-center fw-bold text-white">HR</div>
                    <h2>HR Portal</h2>
                    <p>Employee Management System</p>
                </div>
                <form id="loginForm">

                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    <button type="submit">
                        Login
                    </button>
                    <p id="message"></p>
                </form>
            </div>
        </div>
    </div>


<script src="login.js"></script>


</body>
</html>
